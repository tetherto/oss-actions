name: Reusable C++ Tests

on:
  workflow_call:
    inputs:
      workdir:
        description: "Package directory (e.g., packages/qvac-lib-infer-llamacpp-llm)"
        required: true
        type: string
      artifact_prefix:
        description: "Prefix for artifact names (e.g., 'llm', 'embed', 'nmtcpp')"
        required: true
        type: string
      enable_coverage:
        description: "Enable coverage reporting on Linux"
        required: false
        type: boolean
        default: true
      models:
        description: "JSON array of S3 model configs [{uri: 's3://...', dest: 'models/file.gguf'}]"
        required: false
        type: string
        default: '[]'

jobs:
  test-cpp:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: windows-2022
            platform: windows

    runs-on: ${{ matrix.os }}
    name: cpp-tests-${{ matrix.platform }}-${{ matrix.arch || 'x64' }}

    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/${{ inputs.workdir }}/vcpkg/cache,readwrite"
      GIT_TERMINAL_PROMPT: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure git for private repos
        env:
          GIT_PAT: ${{ secrets.PAT_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          # Configure git to use HTTPS with token
          if [ -n "${GIT_PAT:-}" ]; then
            # Export GIT_PAT for subsequent steps
            echo "GIT_PAT=${GIT_PAT}" >> $GITHUB_ENV
            TOKEN="${GIT_PAT}"
          else
            TOKEN="${GITHUB_TOKEN}"
          fi

          # Set URL rewriting to inject credentials
          git config --global url."https://${TOKEN}:@github.com/".insteadOf "https://github.com/"
          git config --global url."https://${TOKEN}:@github.com/".insteadOf "git@github.com:"

          # Verify the config
          echo "Git URL rewriting configured"
          git config --get-regexp url || true

      - if: ${{ matrix.os == 'ubuntu-24.04' }}
        name: Install llvm-19 on Linux
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 19 all

      - if: ${{ matrix.os == 'ubuntu-24.04' }}
        name: Install Vulkan SDK on Linux
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-noble.list http://packages.lunarg.com/vulkan/lunarg-vulkan-noble.list
          sudo apt update
          sudo apt install vulkan-sdk

      - if: ${{ matrix.os == 'windows-2022' }}
        name: Configure Windows runner
        run: |
          git config --system core.longpaths true
          choco upgrade llvm

      - if: ${{ matrix.os == 'windows-2022' }}
        name: Install Vulkan SDK on Windows
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe -OutFile vulkan-sdk.exe -PassThru
          ./vulkan-sdk.exe --root C:\VulkanSDK --accept-licenses --default-answer --confirm-command install
          echo "VULKAN_SDK=C:\VulkanSDK" >> $Env:GITHUB_ENV

      - if: ${{ matrix.os == 'windows-2022' }}
        name: Configure vcpkg in windows
        run: echo ("VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" -replace '\\', '/') >> $env:GITHUB_ENV

      - if: ${{ matrix.os == 'macos-14' }}
        name: Install vcpkg on macOS
        run: |
          cd ..
          git clone --branch 2025.12.12 --single-branch https://github.com/microsoft/vcpkg.git
          cd vcpkg && ./bootstrap-vcpkg.sh -disableMetrics
          VCPKG_ROOT=$(pwd)
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> $GITHUB_ENV
          echo "$VCPKG_ROOT" >> $GITHUB_PATH
          # Set deployment target for C++20 std::format support
          echo "MACOSX_DEPLOYMENT_TARGET=14.0" >> $GITHUB_ENV

      - if: ${{ matrix.os == 'ubuntu-24.04' }}
        name: Configure vcpkg in linux
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - if: ${{ matrix.os == 'windows-2022' }}
        name: Configure CMake generator on Windows
        shell: pwsh
        run: |
          echo "CMAKE_GENERATOR=Visual Studio 17 2022" >> $env:GITHUB_ENV
          echo "CMAKE_GENERATOR_PLATFORM=x64" >> $env:GITHUB_ENV

      - name: Create vcpkg cache location
        shell: bash
        run: mkdir -p "${{ inputs.workdir }}/vcpkg/cache"

      - name: Get vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/${{ inputs.workdir }}/vcpkg/cache
          key: cpp-tests-v4-${{ matrix.platform }}-${{ matrix.arch || 'x64' }}-${{ hashFiles(format('{0}/vcpkg.json', inputs.workdir), format('{0}/vcpkg-configuration.json', inputs.workdir)) }}
          restore-keys: cpp-tests-v4-${{ matrix.platform }}-${{ matrix.arch || 'x64' }}-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Configure scoped registry for @tetherto and @qvac packages
        shell: bash
        run: |
          cat > .npmrc <<NPMRC
          always-auth=true
          registry=https://registry.npmjs.org/
          @qvac:registry=https://registry.npmjs.org/
          @tetherto:registry=https://npm.pkg.github.com/
          //registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
          //npm.pkg.github.com/:_authToken=${{ secrets.PAT_TOKEN }}
          NPMRC
          git config --global url."https://${{ secrets.PAT_TOKEN }}:@github.com/".insteadOf "https://github.com/"
          git config --global url."https://${{ secrets.PAT_TOKEN }}:@github.com/".insteadOf "git@github.com:"

      - name: Install NPM dependencies
        working-directory: ${{ inputs.workdir }}
        run: |
          npm install
          npm install -g bare bare-make

      - name: Configure AWS credentials
        if: inputs.models != '[]'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Download test models
        if: inputs.models != '[]'
        shell: bash
        working-directory: ${{ inputs.workdir }}
        run: |
          echo "Creating models directory..."
          mkdir -p models/unit-test

          echo '${{ inputs.models }}' | jq -c '.[]' | while read -r model; do
            uri=$(echo "$model" | jq -r '.uri')
            dest=$(echo "$model" | jq -r '.dest')
            echo "Downloading $uri to $dest..."
            mkdir -p "$(dirname "$dest")"
            aws s3 cp "$uri" "$dest"
            echo "✓ Downloaded $(basename "$dest")"
          done

          echo "Verify downloaded models..."
          ls -lh models/unit-test/ || true
          du -sh models/unit-test/* || true

      - name: Build C++ tests with coverage
        if: ${{ matrix.os == 'ubuntu-24.04' && inputs.enable_coverage }}
        working-directory: ${{ inputs.workdir }}
        run: npm run coverage:cpp:build

      - name: Build C++ tests
        if: ${{ matrix.os != 'ubuntu-24.04' || !inputs.enable_coverage }}
        working-directory: ${{ inputs.workdir }}
        run: npm run test:cpp:build

      - name: Run C++ tests
        id: cpp-tests
        shell: bash
        working-directory: ${{ inputs.workdir }}
        env:
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/${{ inputs.workdir }}/.lsan-suppressions.txt
        run: |
          if [ ! -f "build/test/unit/addon-test" ]; then
            echo "ERROR: Test executable not found at build/test/unit/addon-test"
            exit 1
          fi

          cd build/test/unit/ && ./addon-test --gtest_output=xml:cpp-test-results.xml

          # Verify that tests were actually executed
          if [ -f cpp-test-results.xml ]; then
            test_count=$(grep -c '<testcase' cpp-test-results.xml || echo "0")
            if [ "$test_count" -eq 0 ]; then
              echo "ERROR: No tests were executed! Test count: $test_count"
              exit 1
            fi
            echo "✓ Successfully executed $test_count test(s)"
          else
            echo "ERROR: Test results file not generated"
            exit 1
          fi

      - name: Generate Coverage Report
        if: ${{ matrix.os == 'ubuntu-24.04' && inputs.enable_coverage && always() }}
        working-directory: ${{ inputs.workdir }}
        run: |
          npm run coverage:cpp:report
          COVERAGE=$(grep 'TOTAL' build/test/unit/coverage-summary.txt | awk '{print $10}' || echo "0.0")
          echo "LINE_COVERAGE_PERCENTAGE=${COVERAGE}" >> $GITHUB_ENV

      - name: Archive Coverage Results
        if: ${{ matrix.os == 'ubuntu-24.04' && inputs.enable_coverage && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: cpp-coverage-report-${{ inputs.artifact_prefix }}-${{ matrix.platform }}-${{ matrix.arch || 'x64' }}
          path: |
            ${{ inputs.workdir }}/build/test/unit/coverage-html/
            ${{ inputs.workdir }}/build/test/unit/lcov.info
            ${{ inputs.workdir }}/build/test/unit/coverage-summary.txt
            ${{ inputs.workdir }}/build/test/unit/cpp-test-results.xml
          retention-days: 30

      - name: Comment Coverage on PR
        if: ${{ matrix.os == 'ubuntu-24.04' && inputs.enable_coverage && github.event_name == 'pull_request' && always() }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '${{ inputs.workdir }}/build/test/unit/coverage-summary.txt';
            if (fs.existsSync(path)) {
              const coverage = fs.readFileSync(path, 'utf8');
              const body = `## 🧪 C++ Test Coverage Report (${{ inputs.artifact_prefix }})

              **Coverage:** ${process.env.LINE_COVERAGE_PERCENTAGE}%

              <details>
              <summary>📊 Detailed Coverage</summary>

              \`\`\`
              ${coverage}
              \`\`\`

              </details>`;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

      - name: Coverage Summary
        if: ${{ matrix.os == 'ubuntu-24.04' && inputs.enable_coverage && always() }}
        working-directory: ${{ inputs.workdir }}
        run: |
          echo "## 🎯 C++ Test Coverage Summary (${{ inputs.artifact_prefix }})" >> $GITHUB_STEP_SUMMARY
          echo "**Coverage:** ${{ env.LINE_COVERAGE_PERCENTAGE }}%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f build/test/unit/coverage-summary.txt ]; then
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            cat build/test/unit/coverage-summary.txt >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
