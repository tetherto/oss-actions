name: Count Pending Reviews
description: >
  Evaluates PR approvals by reviewer role (maintainer, team lead, other) and
  posts or updates an informational comment on the PR. This action always exits
  successfully — it never blocks or fails a workflow run. Merge enforcement
  should be handled by repository rulesets (Require approvals, Require review
  from Code Owners).

inputs:
  pat-token:
    description: >
      PAT with read:org (team membership lookups) and repo (collaborator
      permission checks) scopes.
    required: true
  github-token:
    description: >
      Token used to post or update the PR comment. Defaults to the built-in
      GITHUB_TOKEN (comments posted as github-actions[bot]). Supply a custom
      token only if you need comments posted under a different identity.
    default: ${{ github.token }}
    required: false
  pr-number:
    description: PR number to check
    required: true
  maintainers-github-team:
    description: >
      GitHub team slug for maintainer approvers (e.g. managers).
      Used for urgent or escalated merges.
    required: true
  team-leads-github-team:
    description: >
      GitHub team slug for team lead approvers.
      Primary reviewers whose approval is required to merge.
    required: true
  total-required-approvals:
    description: Minimum total approvals required across all roles.
    required: true

runs:
  using: node24
  main: dist/index.js
